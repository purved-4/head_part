<div class="relative inline-block">

  <!-- ── Trigger button ── -->
  <button
    (click)="toggle()"
    [class.border-[var(--color-primary)]]="isOpen"
    [class.bg-[var(--color-hover)]]="isOpen"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-[var(--radius-md)]
           border-[1.5px] border-[var(--color-border)]
           bg-[var(--color-surface)] text-[var(--color-font)]
           text-[13px] font-medium cursor-pointer
           transition-all duration-150
           hover:bg-[var(--color-hover)] hover:border-[var(--color-primary)]"
  >
    <!-- settings icon -->
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="2" y1="12" x2="4" y2="12"/>
      <line x1="20" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>

    <span class="select-none">Theme</span>

    <!-- live color dot -->
    <span
      class="w-2 h-2 rounded-full flex-shrink-0 transition-colors duration-200"
      [style.background]="currentSwatch()"
    ></span>

    <!-- chevron -->
    <svg
      class="transition-transform duration-200 text-[var(--color-muted)]"
      [class.rotate-180]="isOpen"
      width="12" height="12" viewBox="0 0 12 12"
    >
      <polyline points="2,4 6,8 10,4" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- ── Dropdown panel ── -->
  <div
    class="absolute right-0 top-[calc(100%+8px)] w-60 z-[1000]
           bg-[var(--color-surface)] border-[1.5px] border-[var(--color-border)]
           rounded-[var(--radius-lg)] shadow-[var(--shadow-md)]
           origin-top-right transition-all duration-200"
    [class.opacity-0]="!isOpen"
    [class.opacity-100]="isOpen"
    [class.scale-95]="!isOpen"
    [class.scale-100]="isOpen"
    [class.pointer-events-none]="!isOpen"
    [class.pointer-events-auto]="isOpen"
    [class.-translate-y-1]="!isOpen"
    [class.translate-y-0]="isOpen"
    role="dialog"
    aria-label="Theme settings"
  >

    <!-- Header -->
    <div class="flex items-center justify-between
                px-3.5 py-2.5
                border-b border-[var(--color-border)]">
      <span class="text-[13px] font-semibold text-[var(--color-font)]">
        Appearance
      </span>
      <button
        (click)="close()"
        aria-label="Close theme panel"
        class="w-6 h-6 flex items-center justify-center
               rounded-[var(--radius-md)] border-none bg-transparent
               text-[var(--color-muted)] cursor-pointer
               transition-all duration-150
               hover:bg-[var(--color-hover)] hover:text-[var(--color-font)]"
      >
        <svg width="14" height="14" viewBox="0 0 14 14">
          <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-3.5 flex flex-col gap-3">

      <!-- Mode toggle -->
      <div class="flex flex-col gap-1.5">
        <span class="text-[10px] font-semibold tracking-widest uppercase
                     text-[var(--color-muted)]">
          Mode
        </span>
        <div class="flex gap-1.5">

          <button
            (click)="theme.setMode('light')"
            class="flex-1 flex items-center justify-center gap-1.5
                   px-2.5 py-1.5 text-[12px] font-medium cursor-pointer
                   rounded-[var(--radius-md)] border-[1.5px]
                   transition-all duration-150"
            [class.bg-[var(--color-primary)]]="!theme.isDark()"
            [class.border-[var(--color-primary)]]="!theme.isDark()"
            [class.text-white]="!theme.isDark()"
            [class.shadow-[var(--shadow-sm)]]="!theme.isDark()"
            [class.bg-transparent]="theme.isDark()"
            [class.border-[var(--color-border)]]="theme.isDark()"
            [class.text-[var(--color-muted)]]="theme.isDark()"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
            </svg>
            Light
          </button>

          <button
            (click)="theme.setMode('dark')"
            class="flex-1 flex items-center justify-center gap-1.5
                   px-2.5 py-1.5 text-[12px] font-medium cursor-pointer
                   rounded-[var(--radius-md)] border-[1.5px]
                   transition-all duration-150"
            [class.bg-[var(--color-primary)]]="theme.isDark()"
            [class.border-[var(--color-primary)]]="theme.isDark()"
            [class.text-white]="theme.isDark()"
            [class.shadow-[var(--shadow-sm)]]="theme.isDark()"
            [class.bg-transparent]="!theme.isDark()"
            [class.border-[var(--color-border)]]="!theme.isDark()"
            [class.text-[var(--color-muted)]]="!theme.isDark()"
          >
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            Dark
          </button>

        </div>
      </div>

      <!-- Divider -->
      <div class="h-px bg-[var(--color-border)]"></div>

      <!-- Color chips -->
      <div class="flex flex-col gap-1.5">
        <span class="text-[10px] font-semibold tracking-widest uppercase
                     text-[var(--color-muted)]">
          Accent color
        </span>
        <div class="grid grid-cols-2 gap-1.5">

          @for (key of theme.colorKeys; track key) {
            <button
              (click)="theme.setColor(key)"
              [title]="palette(key).label"
              class="flex items-center gap-1.5 px-2.5 py-1.5
                     rounded-[var(--radius-md)] border-[1.5px]
                     bg-transparent text-[var(--color-font)] text-[12px]
                     cursor-pointer transition-all duration-150
                     hover:bg-[var(--color-hover)]"
              [class.border-[var(--color-primary)]]="theme.color() === key"
              [class.bg-[var(--color-hover)]]="theme.color() === key"
              [class.border-[var(--color-border)]]="theme.color() !== key"
            >
              <span
                class="w-3 h-3 rounded-full flex-shrink-0"
                [style.background]="theme.isDark()
                  ? palette(key).swatchDark
                  : palette(key).swatchLight"
              ></span>

              <span class="flex-1 text-left">{{ palette(key).label }}</span>

              @if (theme.color() === key) {
                <svg class="flex-shrink-0 text-[var(--color-primary)]"
                     width="11" height="11" viewBox="0 0 12 12">
                  <polyline points="2,6 5,9 10,3" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              }
            </button>
          }

        </div>
      </div>

    </div>
  </div>

</div>
