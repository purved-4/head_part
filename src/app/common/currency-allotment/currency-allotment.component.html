<form class="w-full">

  <div
    class="w-full rounded-[var(--radius-lg)] bg-[var(--color-surface)] border border-[var(--color-border)] shadow-[var(--shadow-md)]"
  >

    <!-- HEADER -->
    <div
      class="px-4 py-4 bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-primary-dark)] border-b border-[var(--color-border)]"
    >

      <h2
        class="text-xl font-bold text-white flex items-center gap-2"
      >
        <span class="material-symbols-outlined">
          currency_exchange
        </span>

        Currency Allotment
      </h2>

      <p class="mt-1 text-sm text-white/80">
        Manage currency rates and payment modes
      </p>

    </div>

    <!-- BODY -->
    <div class="p-6">

      <!-- TOP -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- LEFT -->
        <div>

          <!-- CURRENCY -->
          <div class="mb-6">

            <label
              class="mb-3 flex items-center gap-2 text-sm font-semibold text-[var(--color-font)]"
            >
              <span
                class="material-symbols-outlined text-base text-[var(--color-accent)]"
              >
                currency_exchange
              </span>

              Currency
            </label>

            <select
              [(ngModel)]="selectedCurrency"
              [ngModelOptions]="{ standalone: true }"
              (change)="selectCurrency(selectedCurrency!)"
              class="w-full px-4 py-3 rounded-[var(--radius-md)] bg-[var(--color-bg)] border border-[var(--color-border)]"
            >

              <option value="">
                Select Currency
              </option>

              <option
                *ngFor="let currency of currencies"
                [value]="currency"
              >
                {{ currency }}
              </option>

            </select>

          </div>

          <!-- RATE -->
          <div 
            class="mb-6"
            *ngIf="entityType !== 'PORTAL' && selectedCurrency"
          >

            <label
              class="block mb-2 text-sm font-semibold text-[var(--color-font)]"
            >
              Currency Rate
            </label>

            <input
              type="number"
              [(ngModel)]="rate"
              [ngModelOptions]="{ standalone: true }"
              placeholder="Enter currency rate"
              class="w-full px-4 py-3 rounded-[var(--radius-md)] bg-[var(--color-bg)] border border-[var(--color-border)]"
            />

          </div>

        </div>

        <!-- RIGHT -->
 
<div *ngIf="selectedCurrency">




          <!-- EFFECTIVE FROM -->
          <div
            *ngIf="entityType !== 'PORTAL'"
            class="mt-4"
          >

            <label
              class="block mb-2 text-sm font-semibold text-[var(--color-font)]"
            >
              Effective From
            </label>

            <!-- <input
              type="datetime-local"
              [(ngModel)]="effectiveFromNew"
              [ngModelOptions]="{ standalone: true }"
              class="w-full px-4 py-3 rounded-[var(--radius-md)] bg-[var(--color-bg)] border border-[var(--color-border)]"
            /> -->
      <input
  type="datetime-local"
  name="effectiveFrom"
  [(ngModel)]="effectiveFromNew"
  [min]="minDateTime"
  (focus)="updateMinDateTime()"
  class="w-full px-4 py-3 rounded-[var(--radius-md)] bg-[var(--color-bg)] border border-[var(--color-border)]"
/>

          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div
        class="mt-8 px-6 py-4 border border-[var(--color-border)] rounded-[var(--radius-lg)] bg-[var(--color-hover)] flex gap-3"
      >

        <button
          *ngIf="selectedCurrency"
          type="button"
          (click)="clearSelection()"
          class="flex-1 py-2.5 rounded-[var(--radius-md)] border border-[var(--color-border)]"
        >
          Clear
        </button>

        <button
          type="button"
          (click)="submit()"
          class="flex-1 py-2.5 rounded-[var(--radius-md)] bg-[var(--color-primary)] text-white"
        >
          Save Currency
        </button>

      </div>

      <!-- TABLE -->
      <div
        class="overflow-hidden rounded-[var(--radius-lg)] border border-[var(--color-border)] mt-6"
      >

        <div
          class="px-4 py-3 bg-[var(--color-hover)] border-b border-[var(--color-border)]"
        >

          <h3 class="font-semibold">
            Currency Rate History
          </h3>

        </div>

        <div class="overflow-x-auto">

          <table class="w-full">

            <thead class="bg-[var(--color-bg)]">

              <tr>

                <th class="px-6 py-4 text-left">
                  Rate
                </th>

                <th class="px-6 py-4 text-left">
                  Effective From
                </th>

              

                <th class="px-6 py-4 text-center">
                  Action
                </th>

              </tr>

            </thead>

            <tbody>

              <ng-container
                *ngIf="existingData[selectedCurrency || 'INR'] as data"
              >

                <tr
                  *ngFor="let item of data?.currencyRates || []"
                  class="border-t border-[var(--color-border)]"
                >

                  <!-- RATE -->
                  <td class="px-6 py-4">
                    {{ item.rate }}
                  </td>

                  <!-- DATE -->
                  <td class="px-6 py-4">
                    {{
                      item.effectiveFrom
                        ? (item.effectiveFrom | tz:'full')
                        : '-'
                    }}
                  </td>

              

                  <!-- ACTION -->
                  <td class="px-6 py-4">

                    <div class="flex justify-center gap-2">

                      <!-- EDIT -->
                      <button
                        type="button"
                        class="p-2 rounded-lg text-blue-600 hover:bg-blue-50 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
                         [disabled]="isPastDate(item.effectiveFrom)"
                        (click)="editRate(
                          data.currencyId,
                          item.id,
                          item.rate
                        )"
                      >

                        <span class="material-symbols-outlined">
                          edit
                        </span>

                      </button>

                      <!-- DELETE -->
                      <!-- <button
                        type="button"
                        class="p-2 rounded-lg text-red-600 hover:bg-red-50"
                        (click)="deleteRate(
                          data.currencyId,
                          item.id
                        )"
                      >

                        <span class="material-symbols-outlined">
                          delete
                        </span>

                      </button> -->
                      <!-- DELETE -->
<!-- DELETE -->
<button
  type="button"
  class="p-2 rounded-lg text-red-600 hover:bg-red-50 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
  [disabled]="isPastDate(item.effectiveFrom)"
  (click)="deleteRate(
    data.currencyId,
    item.id
  )"
>

  <span class="material-symbols-outlined">
    delete
  </span>

</button>

                    </div>

                  </td>

                </tr>

              </ng-container>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</form>

<!-- EDIT MODAL -->
<div
  *ngIf="showEditModal"
  class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
>

  <div
    class="w-full max-w-md rounded-2xl bg-white shadow-2xl"
  >

    <!-- HEADER -->
    <div
      class="px-6 py-4 border-b border-gray-200 flex items-center justify-between"
    >

      <h3 class="text-lg font-semibold">
        Update Currency Rate
      </h3>

      <button
        type="button"
        (click)="showEditModal = false"
      >

        <span class="material-symbols-outlined">
          close
        </span>

      </button>

    </div>

    <!-- BODY -->
    <div class="p-6">

      <label class="block mb-2 text-sm font-medium">
        New Rate
      </label>

      <input
        type="number"
        [(ngModel)]="editingRate"
        [ngModelOptions]="{ standalone: true }"
        class="w-full px-4 py-3 rounded-xl border border-gray-300"
      />

    </div>

    <!-- FOOTER -->
    <div
      class="px-6 py-4 border-t border-gray-200 flex gap-3"
    >

      <button
        type="button"
        (click)="showEditModal = false"
        class="flex-1 py-2.5 rounded-xl border border-gray-300"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="updateRate()"
        class="flex-1 py-2.5 rounded-xl bg-[var(--color-primary)] text-white"
      >
        Update
      </button>

    </div>

  </div>

</div>
