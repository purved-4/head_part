<div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100 w-full">
  <div class="flex gap-5">
    <!-- Currency Dropdown -->
    <div class="w-1/2">
      <label
        class="block text-sm font-semibold text-gray-700 mb-1.5 tracking-wide"
      >
        Currency
      </label>
      <div class="relative">
        <select
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-700 appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 hover:bg-gray-100"
          (change)="onCurrencyChange($event)"
        >
          <option value="" disabled selected class="text-gray-400">
            Select Currency
          </option>
          <option *ngFor="let c of currencies" [value]="c.currency">
            {{ c.currency }}
          </option>
        </select>
        <!-- Custom dropdown arrow -->
        <div
          class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none"
        >
          <svg
            class="w-5 h-5 text-gray-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </div>
      </div>
    </div>

    <!-- Mode Dropdown (Conditional) -->
    <div class="w-1/2">
      <label
        class="block text-sm font-semibold text-gray-700 mb-1.5 tracking-wide"
      >
        Mode
      </label>
      <div class="relative">
        <select
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-gray-700 appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 hover:bg-gray-100 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed"
          (change)="onModeChange($event)"
          [value]="selectedMode"
          [disabled]="!selectedCurrency"
        >
          <option value="" disabled>Select Mode</option>
          <option
            *ngFor="let mode of availableModes"
            [value]="mode.toLowerCase()"
          >
            {{ mode }}
          </option>
        </select>
        <!-- Custom dropdown arrow -->
        <div
          class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none"
        >
          <svg
            class="w-5 h-5 text-gray-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- No modes message -->
  <div
    *ngIf="selectedCurrency && !availableModes.length"
    class="mt-4 text-sm text-amber-600 bg-amber-50 px-4 py-2.5 rounded-lg border border-amber-200"
  >
    <span class="flex items-center gap-2">
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      No payment modes available for this currency
    </span>
  </div>


  <div class="mt-5">
    <router-outlet></router-outlet>
  </div>
</div>
