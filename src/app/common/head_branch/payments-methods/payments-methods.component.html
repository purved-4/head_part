<div class="w-full">
  <div class="flex items-end gap-3">
    <!-- Currency -->
    <div class="flex-1">
      <label
        *ngIf="selectedMode !== 'upi'"
        class="block text-[11px] font-semibold uppercase tracking-wider text-[var(--color-font)] mb-1"
      >
        Currency
      </label>

      <div class="relative">
        <select
          class="w-full h-9 rounded-lg border border-[var(--color-border)] px-3 text-sm font-medium text-[var(--color-font)] outline-none appearance-none focus:ring-1 focus:ring-[var(--color-primary)] focus:border-[var(--color-primary)] transition-all"
          [ngModel]="selectedCurrency?.currency"
          (ngModelChange)="onCurrencyChange($event)"
        >
          <option
            *ngIf="selectedCurrency && !isCurrencyInList()"
            [value]="selectedCurrency.currency"
          >
            {{ selectedCurrency.currency }}
          </option>

          <option *ngFor="let c of currencies" [value]="c.currency">
            {{ c.currency }}
          </option>
        </select>
      </div>
    </div>

    <!-- Mode -->
    <div class="flex-1">
      <label
        *ngIf="selectedMode !== 'upi'"
        class="block text-[11px] font-semibold uppercase tracking-wider text-[var(--color-font)] mb-1"
      >
        Mode
      </label>

      <div class="relative">
        <select
          class="w-full h-9 rounded-lg border border-[var(--color-border)] px-3 text-sm font-medium text-[var(--color-font)] outline-none appearance-none focus:ring-1 focus:ring-[var(--color-primary)] focus:border-[var(--color-primary)] transition-all"
          [(ngModel)]="selectedMode"
          (change)="onModeChange($event)"
        >
          <option *ngFor="let mode of availableModes" [value]="mode">
            {{ mode | uppercase }}
          </option>
        </select>
      </div>
    </div>
  </div>
</div>
