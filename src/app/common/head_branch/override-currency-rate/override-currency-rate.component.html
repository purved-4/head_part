<div class="p-4 bg-[var(--color-bg)] ">

  <div class="mb-4 text-sm text-[var(--color-font)]">
    <span class="font-semibold">Custom Rate Enabled:</span>
    <span [ngClass]="customRate ? 'text-green-600' : 'text-red-500'">
      {{ customRate ? 'Yes' : 'No' }}
    </span>
  </div>

  <div *ngIf="currencies.length > 0; else noData" class="space-y-3">

    <div *ngFor="let currency of currencies"
         class="border border-[var(--color-border)] rounded-xl p-4 bg-[var(--color-surface)] shadow-sm">

      <div class="flex flex-col gap-3">

        <!-- Header -->
        <div class="flex justify-between items-center">
          <div>
            <div class="font-semibold text-lg text-[var(--color-font)]">
              {{ currency.currency }}
            </div>

            <div class="text-sm text-[var(--color-muted)]">
              Chief Rate: {{ currency.rate }}
            </div>
          </div>

          <button
            *ngIf="customRate"
            (click)="startEdit(currency)"
            class="text-blue-600 hover:text-blue-800 text-sm font-medium"
          >
            Edit
          </button>
        </div>

        <!-- Override Rate -->
        <div class="grid grid-cols-1 gap-2">
          <label class="text-sm font-medium text-[var(--color-font)]">
            Override Rate
          </label>

          <input
            type="number"
            [(ngModel)]="currency.overrideRate"
            [disabled]="!currency.isEditing"
            class="border border-[var(--color-border)] bg-[var(--color-surface)] text-[var(--color-font)] rounded-lg px-3 py-2"
            placeholder="Enter override rate"
          />
        </div>

        <!-- Effective From -->
        <div class="grid grid-cols-1 gap-2">
          <label class="text-sm font-medium text-[var(--color-font)]">
            Effective From
          </label>

          <input
            type="datetime-local"
            [(ngModel)]="currency.effectiveFrom"
            [disabled]="!currency.isEditing"
            class="border border-[var(--color-border)] bg-[var(--color-surface)] text-[var(--color-font)] rounded-lg px-3 py-2"
          />
        </div>

        <!-- Save Button -->
        <button
          *ngIf="currency.isEditing"
          type="button"
          (click)="createCustomCurrency(currency); currency.isEditing = false"
          class="px-4 py-2 rounded-lg text-white bg-[var(--color-primary)]"
        >
          Save
        </button>

      </div>
    </div>

  </div>

  <ng-template #noData>
    <div class="text-[var(--color-muted)] text-center">
      No currencies found
    </div>
  </ng-template>

</div>
