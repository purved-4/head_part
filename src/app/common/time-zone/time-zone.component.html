<div #dropdownWrap class="relative inline-block">
  <button
    type="button"
    (click)="toggleDropdown()"
    class="flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white shadow-sm transition hover:bg-slate-50 hover:shadow"
    aria-label="Open time zone selector"
  >
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      class="h-5 w-5 text-slate-700"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 22a10 10 0 1 0-10-10 10 10 0 0 0 10 10Z"
      />
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M2 12h20M12 2a15.3 15.3 0 0 1 0 20M12 2a15.3 15.3 0 0 0 0 20"
      />
    </svg>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 z-50 mt-3 w-[380px] overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl"
  >
    <div class="border-b border-slate-100 px-4 py-3">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">
        Global Time Zone
      </p>

      <div class="mt-3 grid grid-cols-2 gap-2">
        <div class="rounded-xl border border-slate-200 bg-white p-3">
          <p class="text-[11px] font-medium uppercase tracking-wide text-slate-500">
            UTC Time
          </p>
          <p class="mt-1 text-sm font-semibold text-slate-900">
            {{ getUtcTime() }}
          </p>
        </div>

        <div class="rounded-xl border border-slate-200 bg-white p-3">
          <p class="text-[11px] font-medium uppercase tracking-wide text-slate-500">
            Local Time
          </p>
          <p class="mt-1 text-sm font-semibold text-slate-900">
            {{ getSelectedLocalTime() }}
          </p>
        </div>
      </div>
    </div>

    <div class="max-h-96 overflow-auto p-2">
      <button
        type="button"
        (click)="useSystem()"
        class="w-full rounded-xl px-3 py-3 text-left transition hover:bg-slate-50"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-900">
              System timezone
            </p>
            <!-- <p class="truncate text-xs text-slate-500">
              {{ timeZoneService.getSystemTimeZone() }} ·
              {{ timeZoneService.getOffsetLabel(timeZoneService.getSystemTimeZone()) }}
            </p> -->

            <div class="mt-2 text-xs text-slate-600">
              <div>Local: {{ formatNoSeconds(now, timeZoneService.getSystemTimeZone()) }}</div>
              <div>UTC: {{ formatNoSeconds(now, "UTC") }}</div>
            </div>
          </div>

          <span
            *ngIf="currentState?.mode === 'SYSTEM'"
            class="rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-semibold text-emerald-700"
          >
            Selected
          </span>
        </div>
      </button>

      <button
        *ngFor="let zone of zones"
        type="button"
        (click)="selectZone(zone)"
        class="w-full rounded-xl px-3 py-3 text-left transition hover:bg-slate-50"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-900">
              {{ zone.label }}
            </p>
            <!-- <p class="truncate text-xs text-slate-500">
              {{ zone.iana }} · {{ timeZoneService.getOffsetLabel(zone.iana) }}
            </p> -->

            <div class="mt-2 text-xs text-slate-600">
              <div>Local: {{ getZoneLocalTime(zone) }}</div>
              <div>UTC: {{ getZoneUtcTime(zone) }}</div>
            </div>
          </div>

          <span
            *ngIf="isSelected(zone)"
            class="rounded-full bg-blue-50 px-2.5 py-1 text-xs font-semibold text-blue-700"
          >
            Selected
          </span>
        </div>
      </button>
    </div>
  </div>
</div>
