<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-[var(--color-bg)]/70 backdrop-blur-sm"
>
  <div
    class="w-full max-w-md mx-4 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-[var(--radius-lg)] shadow-[var(--shadow-md)] overflow-hidden"
  >
    <!-- Header -->
    <div
      class="px-6 py-4 bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-primary-light)]"
    >
      <h2 class="text-xl font-semibold text-[var(--color-font)]">
        Add New Limit
      </h2>
    </div>

    <!-- Content -->
    <div class="px-6 py-6">
      <!-- Self Limit -->
      <div
        class="mb-4 p-4 bg-[var(--color-hover)] border border-[var(--color-border)] rounded-[var(--radius-md)]"
      >
        <p class="text-sm font-medium text-[var(--color-muted)]">Self Limit</p>

        <p class="mt-2 text-3xl font-bold text-[var(--color-primary-light)]">
          {{ selfLimitRemainingAmount || 0 }}
        </p>
      </div>

      <!-- Current Limit -->
      <div
        class="mb-6 p-4 bg-[var(--color-hover)] border border-[var(--color-border)] rounded-[var(--radius-md)]"
      >
        <p class="text-sm font-medium text-[var(--color-muted)]">
          Current Limit
        </p>

        <p class="mt-2 text-3xl font-bold text-[var(--color-primary-light)]">
          {{ limitRemainingAmount || 0 }}
        </p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="addLimit()" #limitForm="ngForm">
        <!-- Amount -->
        <div class="mb-6">
          <label
            for="transactionAmount"
            class="block mb-2 text-sm font-medium text-[var(--color-font)]"
          >
            Amount
          </label>

          <input
            type="number"
            id="transactionAmount"
            [(ngModel)]="transactionAmount"
            name="transactionAmount"
            placeholder="Enter Amount"
            step="0.01"
            min="0"
            required
            class="w-full px-4 py-3 bg-[var(--color-bg)] text-[var(--color-font)] placeholder:text-[var(--color-muted)] border border-[var(--color-border)] rounded-[var(--radius-md)] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary-light)] focus:border-[var(--color-primary)] transition-all"
          />

          <p class="mt-2 text-xs text-[var(--color-muted)]">
            Please enter a valid Amount greater than 0
          </p>
        </div>

        <!-- Error -->
        <div
          *ngIf="errorMessage"
          class="mb-4 p-3 bg-[var(--color-danger)]/10 border border-[var(--color-danger)] rounded-[var(--radius-md)]"
        >
          <p class="text-sm text-[var(--color-danger)]">
            {{ errorMessage }}
          </p>
        </div>

        <!-- Success -->
        <div
          *ngIf="successMessage"
          class="mb-4 p-3 bg-[var(--color-success)]/10 border border-[var(--color-success)] rounded-[var(--radius-md)]"
        >
          <p class="text-sm text-[var(--color-success)]">
            {{ successMessage }}
          </p>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3">
          <button
            type="button"
            (click)="onCancel()"
            class="flex-1 px-4 py-3 font-medium text-[var(--color-font)] bg-[var(--color-hover)] border border-[var(--color-border)] rounded-[var(--radius-md)] hover:bg-[var(--color-border)] transition-all"
          >
            Cancel
          </button>

          <button
            type="submit"
            class="flex-1 px-4 py-3 font-medium text-[var(--color-font)] bg-[var(--color-primary)] rounded-[var(--radius-md)] hover:bg-[var(--color-primary-dark)] transition-all"
          >
            Add Limit
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
