<div #hostEl [ngClass]="['relative w-full', containerClass]">
  <div
    [ngClass]="[
      'relative',
      inputWrapClass,
      isOpen ? 'rounded-b-none' : 'rounded-lg'
    ]"
  >
  <input
  #searchInput
  #innerInput
  type="text"
  autocomplete="off"
  [value]="displayValue"
  [placeholder]="placeholder"
  (click)="openDropdown()"
  (input)="onSearch($event)"
  (keydown)="onKeyDown($event)"
  (paste)="onPaste($event)"
  (focus)="onFocus()"
  (blur)="onBlur()"
  [ngClass]="[
    'w-full rounded-lg px-1 py-2 border-2 border-gray-200 text-base bg-white outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-200',
    inputClass
  ]"
  role="combobox"
  aria-haspopup="listbox"
  [attr.aria-expanded]="isOpen"
  aria-autocomplete="list"
  aria-controls="dropdown-list"
/>


    <!-- Dropdown toggle button -->
    <button
      type="button"
      (click)="toggleDropdown()"
      class="absolute right-3 top-1/2 transform -translate-y-1/2 p-1 focus:outline-none"
      [ngClass]="arrowClass"
      aria-label="toggle dropdown"
[attr.aria-expanded]="isOpen"
      aria-haspopup="listbox"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path
          d="M6 9l6 6 6-6"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
  </div>

  <!-- Dropdown panel rendered as overlay when open -->
  <ng-template #panelTpl>
    <div
      class="mt-1 z-50"
      [ngClass]="['absolute left-0 right-0', listWrapperClass]"
      style="position: absolute"
    >
      <div
        id="dropdown-list"
        class="max-h-52 overflow-auto rounded-b-lg shadow-lg ring-1 ring-black ring-opacity-5 dropdown-list"
        [ngClass]="['bg-white border-2 border-blue-500 border-t-0', listClass]"
        role="listbox"
        tabindex="-1"
      >
        <ng-container *ngIf="(filteredOptions?.length ?? 0) > 0; else noResults">
          <div
            *ngFor="let option of filteredOptions || []; let i = index"
            class="cursor-pointer px-4 py-3 text-sm border-b border-slate-100 transition dropdown-item"
            [ngClass]="[
              itemClass,
              i === highlightedIndex ? highlightedClass : ''
            ]"
            (pointerdown)="onItemPointerDown(option, $event)"
            (mouseenter)="highlightedIndex = i"
            role="option"
            [attr.aria-selected]="i === highlightedIndex"
            [id]="'dropdown-option-' + i"
          >
            <span
              [innerHTML]="highlightMatch(getOptionLabel(option), searchTerm || '')"
              [ngClass]="optionTextClass"
            ></span>
          </div>
        </ng-container>
      </div>
    </div>
  </ng-template>

  <!-- No results template -->
  <ng-template #noResults>
    <div *ngIf="searchTerm && isOpen" class="mt-1">
      <div class="px-4 py-3 text-sm text-slate-500" [ngClass]="noResultsClass">
        No results found for "{{ searchTerm }}"
      </div>
    </div>
  </ng-template>
</div>
