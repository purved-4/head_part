<div class="flex items-center gap-2">
  <span class="text-xs text-gray-500 font-medium"> Auto Refresh:</span>

  <select
    [(ngModel)]="interval"
    (ngModelChange)="changeInterval()"
    class="border border-gray-300 text-sm rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-green-400"
  >
    <!-- Placeholder -->
    <option [ngValue]="null" selected>Select</option>

    <option *ngFor="let sec of intervals" [ngValue]="sec">{{ sec }} sec</option>
  </select>
</div>
