<div class="flex items-center gap-4">
  <!-- ⏱ Interval Dropdown -->
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-500 font-medium">Refresh:</span>

    <select
      [(ngModel)]="interval"
      (change)="changeInterval()"
      class="border border-gray-300 text-sm rounded-md px-2 py-1 focus:outline-none focus:ring-1 focus:ring-green-400"
    >
      <option *ngFor="let sec of intervals" [value]="sec">{{ sec }} sec</option>
    </select>
  </div>

  <!-- Divider -->
  <div class="h-4 w-px bg-gray-300"></div>

  <!-- Toggle -->
  <div
    (click)="toggleAutoRefresh()"
    class="flex items-center gap-2 cursor-pointer select-none"
  >
    <!-- Switch -->
    <div
      class="w-9 h-5 flex items-center rounded-full p-1 transition-all duration-300"
      [ngClass]="isActive ? 'bg-green-500' : 'bg-red-500'"
    >
      <div
        class="w-3.5 h-3.5 bg-white rounded-full shadow-sm transform transition-all duration-300"
        [ngClass]="isActive ? 'translate-x-4' : ''"
      ></div>
    </div>

    <!-- Label -->
    <span
      class="text-sm font-medium"
      [ngClass]="isActive ? 'text-green-600' : 'text-red-500'"
    >
      {{ isActive ? "Active" : "Inactive" }}
    </span>
  </div>
</div>
