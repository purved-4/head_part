

<!-- Bottom Sheet Wrapper -->
<div
  class="fixed bottom-0 left-0 right-0 z-[20] 
         transition-transform duration-300 ease-in-out"
  [class.translate-y-[92%]]="!isOpen"
  [class.translate-y-0]="isOpen"
>

  <!-- Main Container -->
  <div
    class="relative bg-[var(--color-hover)]
           rounded-t-[22px] 
           shadow-[0_-6px_20px_rgba(0,0,0,0.15)]"
  >

    <!-- Slim Top Bar (Integrated Arrow Raised Slightly) -->
    <div
      (click)="toggleSheet()"
      class="relative h-[16px] flex items-center justify-end pr-6 cursor-pointer"
    >
      <!-- Arrow (slightly raised inside same container) -->
      <div
        class="absolute -top-3.5 right-7 w-10 h-8 
              bg-[var(--color-hover)] rounded-t-full
               flex items-center justify-center"
      >
        <span class="material-symbols-outlined text-[18px] text-slate-700">
          {{ isOpen ? 'keyboard_arrow_down' : 'keyboard_arrow_up' }}
        </span>
      </div>
    </div>

    <!-- Content -->
    <div
  class="px-6 pt-6 pb-8 space-y-5 transition-opacity duration-300"
  [class.opacity-0]="!isOpen"
  [class.opacity-100]="isOpen"
>

<!-- Theme Toggle -->
<!-- Bottom Actions -->
<div class="flex items-center gap-3">

  <!-- Theme Toggle -->
  <button
    (click)="theme.toggleMode()"
    class="
      w-12
      h-12
      rounded-xl
      flex
      items-center
      justify-center
      transition-all
      duration-200
      cursor-pointer
    "
    [ngClass]="{
      'bg-[var(--color-primary)] text-white shadow-md': theme.isDark(),
      'bg-[var(--color-surface)] text-[var(--color-muted)] border border-[var(--color-border)] hover:bg-[var(--color-hover)]': !theme.isDark()
    }"
    [title]="theme.isDark() ? 'Light Mode' : 'Dark Mode'"
  >
    <span class="material-symbols-outlined text-[22px]">
      {{ theme.isDark() ? "light_mode" : "dark_mode" }}
    </span>
  </button>


  <!-- Pending Threads -->
  <!-- Pending Threads Button -->
<button
  (click)="openPendingThreads()"
  class="
    w-12
    h-12
    rounded-xl
    flex
    items-center
    justify-center
    bg-[var(--color-surface)]
    text-[var(--color-muted)]
    border
    border-[var(--color-border)]
    hover:bg-[var(--color-hover)]
    hover:text-[var(--color-primary)]
    transition-all
    duration-200
    cursor-pointer
  "
  title="Pending Threads"
>
  <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#00000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M23.1117 4.49449C23.4296 2.94472 21.9074 1.65683 20.4317 2.227L2.3425 9.21601C0.694517 9.85273 0.621087 12.1572 2.22518 12.8975L6.1645 14.7157L8.03849 21.2746C8.13583 21.6153 8.40618 21.8791 8.74917 21.968C9.09216 22.0568 9.45658 21.9576 9.70712 21.707L12.5938 18.8203L16.6375 21.8531C17.8113 22.7334 19.5019 22.0922 19.7967 20.6549L23.1117 4.49449ZM3.0633 11.0816L21.1525 4.0926L17.8375 20.2531L13.1 16.6999C12.7019 16.4013 12.1448 16.4409 11.7929 16.7928L10.5565 18.0292L10.928 15.9861L18.2071 8.70703C18.5614 8.35278 18.5988 7.79106 18.2947 7.39293C17.9906 6.99479 17.4389 6.88312 17.0039 7.13168L6.95124 12.876L3.0633 11.0816ZM8.17695 14.4791L8.78333 16.6015L9.01614 15.321C9.05253 15.1209 9.14908 14.9366 9.29291 14.7928L11.5128 12.573L8.17695 14.4791Z" fill="var(--color-primary)"></path> </g></svg>
</button>

</div>


  <!-- Payin -->
  <div class="flex justify-between items-center text-sm">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-amber-500"></span>
      <span class="text-slate-600">Payin</span>
    </div>

    <span class="font-semibold text-slate-800">
      ₹{{ format(payin) }}
    </span>
  </div>

      <!-- Payout -->
      <div class="flex justify-between items-center text-sm">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-amber-500"></span>
          <span class="text-slate-600">Payout</span>
        </div>
        <span class="font-semibold text-slate-800">
          ₹{{ format(payout) }}
        </span>
      </div>

      <!-- Reward -->
      <div class="flex justify-between items-center text-sm">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-blue-500"></span>
          <span class="text-slate-600">Reward</span>
        </div>
        <span class="font-semibold text-slate-800">
          ₹{{ format(reward) }}
        </span>
      </div>

      <!-- Limit -->
      <div class="flex justify-between items-center text-sm">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500"></span>
          <span class="text-slate-600">Balance</span>
        </div>
        <span class="font-semibold text-slate-800">
          ₹{{ format(limit) }}
        </span>
      </div>
    </div>

  </div>
   
</div>

 <app-pending-threads
    [isOpen]="showPendingThreads"
    [entityId]="entityId"
    [entityType]="entityType"
    (close)="closePendingThreads()"
    (chatOpened)="onChatPanelStateChange($event)"
  >
  </app-pending-threads>
