<div class="head-layout bg-[var(--color-bg)] min-h-screen">
  <!-- Mobile Overlay -->
  <div
    *ngIf="mobileMenuOpen"
    class="fixed inset-0 bg-black/50 z-40 md:hidden"
    (click)="closeMobileMenu()"
  ></div>

  <!-- Sidebar -->
  <app-head-nav-sidebar
    [collapsed]="sidebarCollapsed"
    [isMobileOpen]="mobileMenuOpen"
    (toggleSidebar)="toggleSidebar()"
    (secondaryPanelStateChange)="onSecondaryPanelChange($event)"
    (closeMobileMenu)="closeMobileMenu()"
  >
  </app-head-nav-sidebar>

  <!-- Header -->
  <app-head-nav-header
    [pageTitle]="pageTitle"
    [userName]="userName"
        [marginLeft]="mainLeftMargin"

    [isMobileMenuOpen]="mobileMenuOpen"
    (toggleMobileMenu)="toggleMobileMenu()"
    (balanceChange)="onBalanceChange($event)"
    (openSettings)="openSettings()"
    (search)="onSearch($event)"
    (notificationClick)="openNotificationSidebar()"
  >
  </app-head-nav-header>

  <!-- Notification Sidebar -->
  <app-sidebar-notification
    [isOpen]="isNotificationSidebarOpen"
    (close)="closeNotificationSidebar()"
    (unreadCountChange)="onUnreadCountChange($event)"
  >
  </app-sidebar-notification>

  <!-- Pending Threads -->

  <app-pending-threads
    [isOpen]="showPendingThreads"
    [entityId]="entityId"
    [entityType]="entityType"
    (close)="closePendingThreads()"
    (chatOpened)="onChatPanelStateChange($event)"
  >
  </app-pending-threads>


  <!-- Floating Chat Button -->
  <div class="hidden md:block lg:block">
  <button
    *ngIf="!chatPanelOpen"
    mat-fab
    type="button"
    class="fixed bottom-16 right-7 z-[80] w-[48px] h-[48px] rounded-2xl bg-[var(--color-primary)] text-white shadow-[0_12px_35px_rgba(0,0,0,0.28)] hover:scale-110 hover:shadow-[0_18px_45px_rgba(0,0,0,0.35)] active:scale-95 transition-all duration-300 flex items-center justify-center group"
    (click)="
      showPendingThreads = !showPendingThreads;
      isNotificationSidebarOpen = false;
      mobileMenuOpen = false
    "
  >
    <svg width="32px" height="32px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#00000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M23.1117 4.49449C23.4296 2.94472 21.9074 1.65683 20.4317 2.227L2.3425 9.21601C0.694517 9.85273 0.621087 12.1572 2.22518 12.8975L6.1645 14.7157L8.03849 21.2746C8.13583 21.6153 8.40618 21.8791 8.74917 21.968C9.09216 22.0568 9.45658 21.9576 9.70712 21.707L12.5938 18.8203L16.6375 21.8531C17.8113 22.7334 19.5019 22.0922 19.7967 20.6549L23.1117 4.49449ZM3.0633 11.0816L21.1525 4.0926L17.8375 20.2531L13.1 16.6999C12.7019 16.4013 12.1448 16.4409 11.7929 16.7928L10.5565 18.0292L10.928 15.9861L18.2071 8.70703C18.5614 8.35278 18.5988 7.79106 18.2947 7.39293C17.9906 6.99479 17.4389 6.88312 17.0039 7.13168L6.95124 12.876L3.0633 11.0816ZM8.17695 14.4791L8.78333 16.6015L9.01614 15.321C9.05253 15.1209 9.14908 14.9366 9.29291 14.7928L11.5128 12.573L8.17695 14.4791Z" fill="#0F0F0F"></path> </g></svg>

    <span
      *ngIf="!showPendingThreads"
      class="absolute top-2 left-2 w-3 h-3 rounded-full bg-red-500 border-2 border-white animate-pulse"
    >
    </span>
  </button>
</div>
  <!-- MAIN CONTENT -->
  <main
    class="pt-[72px] min-h-[calc(100vh-72px)] bg-[var(--color-bg)] overflow-auto transition-all duration-300"
    [style.marginLeft.px]="mainLeftMargin"
    [style.marginRight.px]="mainRightMargin"
    [class.mobile-content]="mobileMenuOpen"
  >
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile Footer -->
  <app-head-mobile-footer
    *ngIf="isMobileView()"
    [payin]="headerPayin"
    [payout]="headerPayout"
    [reward]="headerReward"
    [limit]="headerLimit"
  >
  </app-head-mobile-footer>
