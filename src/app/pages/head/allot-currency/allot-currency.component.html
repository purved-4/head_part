<form [formGroup]="form">
  <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div
      class="bg-white w-full max-w-4xl rounded-2xl shadow-xl overflow-hidden"
    >
      <!-- HEADER -->
      <div
        class="flex justify-between items-center px-6 py-4 border-b bg-gray-50"
      >
        <div>
          <h2
            class="text-lg font-semibold text-gray-800 flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-blue-600">
              currency_exchange
            </span>
            Allot Currency
          </h2>

          <div *ngIf="headerCurrencyData" class="text-xs text-gray-500 mt-1">
            {{ headerCurrencyData.currency }} • Rate:
            {{ headerCurrencyData.rate || "-" }}
          </div>
        </div>

        <div class="flex items-center gap-2">
          <!-- EDIT -->
          <button
            *ngIf="!isEditMode"
            type="button"
            (click)="enableEdit()"
            class="p-2 rounded-lg hover:bg-gray-100"
          >
            <span class="material-symbols-outlined">edit</span>
          </button>

          <!-- CANCEL -->
          <button
            *ngIf="isEditMode"
            type="button"
            (click)="cancelEdit()"
            class="p-2 rounded-lg hover:bg-red-50"
          >
            <span class="material-symbols-outlined text-red-500">close</span>
          </button>

          <!-- CLOSE -->
          <button
            type="button"
            (click)="closeModal()"
            class="p-2 rounded-lg hover:bg-gray-100"
          >
            <span class="material-symbols-outlined">cancel</span>
          </button>
        </div>
      </div>

      <!-- BODY -->
      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- LEFT: CURRENCIES -->
        <div formArrayName="currencies" class="space-y-3">
          <h3 class="text-sm font-semibold text-gray-600">Currencies</h3>

          <div
            *ngFor="let item of currencies.controls; let i = index"
            [formGroupName]="i"
            (click)="selectCurrency(i)"
            class="flex items-center justify-between p-4 border rounded-xl cursor-pointer"
            [class.bg-blue-50]="item.value.selected"
          >
            <div class="flex items-center gap-3">
              <input type="radio" [checked]="item.value.selected" />
              <span class="font-medium">{{ item.value.currency }}</span>
            </div>

            <input
              type="number"
              formControlName="amount"
              placeholder="Enter amount"
              class="w-32 px-2 py-1 border rounded text-sm"
              [readonly]="!isEditMode"
            />
          </div>
        </div>

        <!-- RIGHT: MODES -->
        <div class="space-y-3">
          <h3 class="text-sm font-semibold text-gray-600">Payment Modes</h3>

          <div *ngFor="let item of currencies.controls; let i = index">
            <!-- INR -->
            <div
              *ngIf="item.value.selected && item.value.currency === 'INR'"
              class="space-y-2"
            >
              <label
                *ngIf="item.value.allowedModes.includes('BANK')"
                class="flex items-center gap-2 p-3 border rounded-lg"
              >
                <input
                  type="checkbox"
                  value="BANK"
                  (change)="onModeChange($event, i)"
                  [checked]="isChecked('BANK', i)"
                  [disabled]="!isEditMode"
                />
                Bank
              </label>

              <label
                *ngIf="item.value.allowedModes.includes('UPI')"
                class="flex items-center gap-2 p-3 border rounded-lg"
              >
                <input
                  type="checkbox"
                  value="UPI"
                  (change)="onModeChange($event, i)"
                  [checked]="isChecked('UPI', i)"
                  [disabled]="!isEditMode"
                />
                UPI
              </label>
            </div>

            <!-- USD -->
            <div *ngIf="item.value.selected && item.value.currency === 'USD'">
              <label
                *ngIf="item.value.allowedModes.includes('QR')"
                class="flex items-center gap-2 p-3 border rounded-lg"
              >
                <input
                  type="checkbox"
                  (change)="onSingleModeChange('QR', i)"
                  [checked]="isChecked('QR', i)"
                  [disabled]="!isEditMode"
                />
                QR Payment
              </label>
            </div>
          </div>
        </div>
      </div>

      
    </div>
  </div>
</form>
